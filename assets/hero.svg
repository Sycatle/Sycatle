<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" role="img" aria-label="charlie@sycatle terminal: solo builder shipping AI-native SaaS and local-first tools from France">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#11161d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="1" stop-color="#bb9af7"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace; }
      .prompt { fill: #7aa2f7; font-size: 16px; }
      .accent { fill: url(#accent); font-size: 16px; }
      .cmd  { fill: #c0caf5; font-size: 16px; }
      .out  { fill: #9ece6a; font-size: 15px; }
      .dim  { fill: #565f89; font-size: 14px; }
    </style>
  </defs>

  <rect width="880" height="300" rx="14" fill="url(#bg)"/>
  <rect x="0" y="0" width="880" height="34" rx="14" fill="#161b22"/>
  <rect x="0" y="22" width="880" height="12" fill="#161b22"/>

  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text x="440" y="22" text-anchor="middle" class="mono dim">charlie@sycatle: ~</text>

  <g class="mono" transform="translate(28, 70)">
    <text x="0" y="0">
      <tspan class="prompt">charlie@sycatle</tspan><tspan class="cmd">:</tspan><tspan class="accent">~</tspan><tspan class="cmd">$ whoami</tspan>
    </text>
    <text x="0" y="26" class="out">&gt; solo builder · france · automating with ai agents</text>

    <text x="0" y="64">
      <tspan class="prompt">charlie@sycatle</tspan><tspan class="cmd">:</tspan><tspan class="accent">~</tspan><tspan class="cmd">$ ls projects/</tspan>
    </text>
    <text x="0" y="90" class="out">&gt; local-jarvis   asap-website-builder   discord-agent</text>

    <text x="0" y="128">
      <tspan class="prompt">charlie@sycatle</tspan><tspan class="cmd">:</tspan><tspan class="accent">~</tspan><tspan class="cmd">$ cat now.md</tspan>
    </text>
    <text x="0" y="154" class="out">&gt; shipping ai-native SaaS &amp; local-first tools from france</text>

    <text x="0" y="192">
      <tspan class="prompt">charlie@sycatle</tspan><tspan class="cmd">:</tspan><tspan class="accent">~</tspan><tspan class="cmd">$ </tspan>
    </text>

    <rect x="172" y="178" width="9" height="16" fill="#c0caf5">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
